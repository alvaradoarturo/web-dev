<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="stylesheets/style.css">
</head>
<body>
    <section class="calc">
        <div class="screen row">
            <h1 class="value">0</h1>
        </div>
        <div class="row">
            <button class="half button">C</button>
            <button class="forth button"><-</button>
            <button class="forth button">/</button>
        </div>
        <div class="row">
            <button class="forth button">7</button>
            <button class="forth button">8</button>
            <button class="forth button">9</button>
            <button class="forth button">X</button>
        </div>
        <div class="row">
            <button class="forth button">4</button>
            <button class="forth button">5</button>
            <button class="forth button">6</button>
            <button class="forth button">-</button>
        </div>
        <div class="row">
            <button class="forth button">1</button>
            <button class="forth button">2</button>
            <button class="forth button">3</button>
            <button class="forth button">+</button>
        </div>
        <div class="row">
            <button class="third button">0</button>
            <button class="forth button">=</button>
        </div>

    </section>
    
</body>
</html>
